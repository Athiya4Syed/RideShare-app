<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA -->
  <meta name="theme-color" content="#00d4ff"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="RideShare"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon.svg"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RideShare — Login</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

<div class="auth-container">

  <!-- LOGO -->
  <div class="logo">
    <h1>🚗 RideShare</h1>
    <p>Smart carpooling — save money, save the planet</p>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
    <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
  </div>
  
  <!-- Phone number field -->
<div id="phone-section">
  <div class="input-group">
    <span class="input-icon">📱</span>
    <input type="tel" id="signup-phone" placeholder="Phone number (+91XXXXXXXXXX)" />
  </div>
  <button type="button" onclick="sendOTP()" id="send-otp-btn" class="otp-btn">
    📲 Send OTP
  </button>
</div>

<!-- OTP field -->
<div id="otp-section" style="display:none">
  <div class="input-group">
    <span class="input-icon">🔢</span>
    <input type="number" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6"/>
  </div>
  <button type="button" onclick="verifyOTP()" id="verify-otp-btn" class="otp-btn">
    ✅ Verify OTP
  </button>
  <p id="otp-timer" style="color:#aaa;font-size:0.78rem;margin-top:4px;">⏳ OTP valid for 5 minutes</p>
</div>

<div id="otp-status"></div>

  <!-- LOGIN FORM -->
  <div id="login-form" class="auth-form active">
    <h2>Welcome Back 👋</h2>

    <div class="input-group">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="you@email.com"/>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="••••••••"/>
    </div>

    <div id="login-error" class="error-msg"></div>

    <button onclick="login()" class="auth-btn">
      Login →
    </button>

    <p class="switch-text">
      No account?
      <span onclick="switchAuthTab('signup')">Sign up free</span>
    </p>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signup-form" class="auth-form">
    <h2>Create Account 🚀</h2>

    <!-- Role Selector -->
    <div class="role-selector">
      <div class="role-card active" onclick="selectRole('passenger')" id="role-passenger">
        <span>🧍</span>
        <strong>Passenger</strong>
        <small>Book rides</small>
      </div>
      <div class="role-card" onclick="selectRole('driver')" id="role-driver">
        <span>🧭</span>
        <strong>Driver</strong>
        <small>Give rides</small>
      </div>
    </div>

    <div class="input-group">
      <label>Full Name</label>
      <input id="signup-name" type="text" placeholder="Your full name"/>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input id="signup-email" type="email" placeholder="you@email.com"/>
    </div>

    <div class="input-group">
      <label>Phone</label>
      <input id="signup-phone" type="tel" placeholder="+91 98765 43210"/>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="signup-password" type="password" placeholder="Min 6 characters"/>
    </div>

    <div id="signup-error" class="error-msg"></div>

    <button onclick="signup()" class="auth-btn">
      Create Account →
    </button>

    <p class="switch-text">
      Have an account?
      <span onclick="switchAuthTab('login')">Login</span>
    </p>
  </div>

</div>

<script src="auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>

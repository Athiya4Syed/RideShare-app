<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RideShare Admin</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    
    body { background:#0a0a1a; color:#fff; min-height:100vh; }
    
    /* LOGIN */
    #login-screen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }
    
    .login-box {
      background:#111; border:1px solid #00d4ff;
      border-radius:16px; padding:40px;
      width:360px; text-align:center;
    }
    
    .login-box h1 { color:#00d4ff; margin-bottom:8px; }
    .login-box p { color:#aaa; margin-bottom:24px; font-size:0.88rem; }
    
    .login-box input {
      width:100%; padding:12px; border-radius:8px;
      border:1px solid #333; background:#1a1a2e;
      color:#fff; font-size:0.9rem; margin-bottom:12px;
      outline:none;
    }
    
    .login-box button {
      width:100%; padding:12px; background:#00d4ff;
      color:#000; border:none; border-radius:8px;
      font-weight:bold; cursor:pointer; font-size:0.95rem;
    }

    /* DASHBOARD */
    #dashboard { display:none; padding:24px; }

    .admin-header {
      display:flex; justify-content:space-between;
      align-items:center; margin-bottom:24px;
      padding-bottom:16px; border-bottom:2px solid #222;
    }

    .admin-header h1 { color:#00d4ff; font-size:1.5rem; }

    .admin-header button {
      padding:8px 16px; background:transparent;
      border:1px solid #ff4d4d; color:#ff4d4d;
      border-radius:8px; cursor:pointer;
    }

    /* STATS */
    .stats-grid {
      display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      gap:16px; margin-bottom:32px;
    }

    .stat-card {
      background:#111; border:1px solid #222;
      border-radius:12px; padding:20px;
      text-align:center;
    }

    .stat-card .stat-icon { font-size:2rem; margin-bottom:8px; }
    .stat-card .stat-value { font-size:1.8rem; font-weight:bold; color:#00d4ff; }
    .stat-card .stat-label { font-size:0.78rem; color:#aaa; margin-top:4px; }

    /* TABLES */
    .section { margin-bottom:32px; }
    .section h2 { color:#00d4ff; margin-bottom:16px; font-size:1.1rem; }

    .table-wrap { overflow-x:auto; border-radius:12px; border:1px solid #222; }

    table { width:100%; border-collapse:collapse; }
    th { background:#1a1a2e; padding:12px; text-align:left; font-size:0.8rem; color:#aaa; }
    td { padding:12px; border-top:1px solid #222; font-size:0.82rem; color:#ccc; }
    tr:hover td { background:#111; }

    .badge {
      padding:2px 8px; border-radius:20px;
      font-size:0.72rem; font-weight:bold;
    }
    .badge.passenger { background:#0a3d62; color:#00d4ff; }
    .badge.driver { background:#1a3d0a; color:#00ff88; }
    .badge.searching { background:#3d2a00; color:#ffaa00; }
    .badge.matched { background:#003d1f; color:#00ff88; }
    .badge.paid { background:#003d1f; color:#00ff88; }

    .delete-btn {
      padding:3px 10px; background:transparent;
      border:1px solid #ff4d4d; color:#ff4d4d;
      border-radius:6px; cursor:pointer; font-size:0.75rem;
    }

    .refresh-btn {
      padding:6px 14px; background:#00d4ff22;
      border:1px solid #00d4ff; color:#00d4ff;
      border-radius:8px; cursor:pointer; font-size:0.82rem;
      margin-left:12px;
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>RideShare Administration</p>
    <input type="password" id="admin-key-input" placeholder="Enter admin key..." 
      onkeypress="if(event.key==='Enter') adminLogin()"/>
    <button onclick="adminLogin()">Login →</button>
    <p id="login-error" style="color:#ff4d4d;margin-top:12px;font-size:0.82rem;"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="admin-header">
    <h1>🚗 RideShare Admin</h1>
    <div>
      <button class="refresh-btn" onclick="loadStats()">🔄 Refresh</button>
      <button onclick="adminLogout()" style="margin-left:8px;padding:8px 16px;background:transparent;border:1px solid #ff4d4d;color:#ff4d4d;border-radius:8px;cursor:pointer;">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-value" id="stat-users">-</div>
      <div class="stat-label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🚗</div>
      <div class="stat-value" id="stat-rides">-</div>
      <div class="stat-label">Total Rides</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧍</div>
      <div class="stat-value" id="stat-passengers">-</div>
      <div class="stat-label">Passengers</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧭</div>
      <div class="stat-value" id="stat-drivers">-</div>
      <div class="stat-label">Drivers</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🤝</div>
      <div class="stat-value" id="stat-matched">-</div>
      <div class="stat-label">Matched Rides</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-value" id="stat-revenue">-</div>
      <div class="stat-label">Total Revenue</div>
    </div>
  </div>

  <!-- USERS TABLE -->
  <div class="section">
    <h2>👥 Users <span id="users-count" style="color:#aaa;font-size:0.85rem;"></span></h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>

  <!-- RIDES TABLE -->
  <div class="section">
    <h2>🚗 Rides <span id="rides-count" style="color:#aaa;font-size:0.85rem;"></span></h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Passenger</th>
            <th>From</th>
            <th>To</th>
            <th>Type</th>
            <th>Fare</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rides-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const BACKEND = 'https://rideshare-backend-e3ka.onrender.com';
  let adminKey = '';

  function adminLogin() {
    const key = document.getElementById('admin-key-input').value.trim();
    if (!key) return;

    adminKey = key;
    loadStats();
  }

  function adminLogout() {
    adminKey = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function loadStats() {
    try {
      const res = await fetch(`${BACKEND}/admin/stats`, {
        headers: { 'x-admin-key': adminKey }
      });

      if (res.status === 403) {
        document.getElementById('login-error').textContent = '❌ Wrong admin key!';
        return;
      }

      const data = await res.json();

      // Show dashboard
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      // Update stats
      document.getElementById('stat-users').textContent = data.stats.totalUsers;
      document.getElementById('stat-rides').textContent = data.stats.totalRides;
      document.getElementById('stat-passengers').textContent = data.stats.passengers;
      document.getElementById('stat-drivers').textContent = data.stats.drivers;
      document.getElementById('stat-matched').textContent = data.stats.matchedRides;
      document.getElementById('stat-revenue').textContent = `₹${data.stats.totalRevenue}`;

      // Users table
      document.getElementById('users-count').textContent = `(${data.users.length})`;
      document.getElementById('users-table').innerHTML = data.users.map(u => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge ${u.role}">${u.role}</span></td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
          <td><button class="delete-btn" onclick="deleteUser('${u.id}')">🗑️ Delete</button></td>
        </tr>
      `).join('');

      // Rides table
      document.getElementById('rides-count').textContent = `(${data.rides.length})`;
      document.getElementById('rides-table').innerHTML = data.rides.map(r => `
        <tr>
          <td>#${r.id}</td>
          <td>${r.name}</td>
          <td>${r.pickup?.substring(0, 20)}...</td>
          <td>${r.destination?.substring(0, 20)}...</td>
          <td>${r.ride_type}</td>
          <td>₹${r.estimated_fare}</td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td><button class="delete-btn" onclick="deleteRide(${r.id})">🗑️ Delete</button></td>
        </tr>
      `).join('');

    } catch (err) {
      document.getElementById('login-error').textContent = '❌ Connection failed!';
    }
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    await fetch(`${BACKEND}/admin/user/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': adminKey }
    });
    loadStats();
  }

  async function deleteRide(id) {
    if (!confirm('Delete this ride?')) return;
    await fetch(`${BACKEND}/admin/ride/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': adminKey }
    });
    loadStats();
  }
</script>

</body>
</html>
